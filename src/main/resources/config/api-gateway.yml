eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true

spring:
    cloud:
        gateway:
            discovery:
                locator:
                    enabled: true
                
            routes:
                - id: catalog-service
                  uri: lb://CATALOG-SERVICE
                  predicates:
                    - Path=/books/**

                - id: user-service
                  uri: lb://USER-SERVICE
                  predicates:
                    - Path=/users/**

                - id: media-service
                  uri: lb://MEDIA-SERVICE
                  predicates:
                    - Path=/media/**