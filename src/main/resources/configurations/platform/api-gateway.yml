eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true

spring:
    cloud:
        gateway:
            server:
                webflux:
                    routes:
                        - id: user-service
                          uri: lb://USER-SERVICE
                          predicates:
                              - Path=/users/**
                        
                        - id: catalog-service
                          uri: lb://CATALOG-SERVICE
                          predicates:
                              - Path=/books/**
                        
                        - id: media-service
                          uri: lb://MEDIA-SERVICE
                          predicates:
                              - Path=/media/**
                    
                    default-filters:
                        - PreserveHostHeader

                    globalcors:
                        cors-configurations:
                            '[/**]':
                                allowedOrigins: "*"
                                allowed-methods: "*"
                                allowed-headers: "*"

server:
    port: 8080